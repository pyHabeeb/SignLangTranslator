<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Sign Language Translator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<main class="auth-shell">
    <section class="auth-panel">
        <p class="eyebrow">Sign Language Translator</p>
        <h1>Create Account</h1>
        <p class="subtitle">Join and start translating signs to words instantly.</p>

        <form method="POST" class="auth-form">
            <label for="username">Username</label>
            <input id="username" type="text" name="username" placeholder="Username" required>

            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="Password" required>

            <button type="submit">Register</button>
        </form>

        <p class="auth-footnote">Already have an account? <a href="/login">Login</a></p>
    </section>
</main>

</body>
</html>
